<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSL - Activité Flipcard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #ffffff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 14px;
            letter-spacing: 3px;
            color: #ffffff;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.8;
        }

        .container {
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .flip-card {
            width: 100%;
            aspect-ratio: 3/4;
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .flip-card-front {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border: 2px solid #ffffff;
        }

        .flip-card-back {
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            padding: 30px;
            border: 2px solid #ffffff;
            position: relative;
        }

        .card-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            background: linear-gradient(135deg, #2d2d2d, #1a1a1a);
        }

        .card-question {
            font-size: 98px;
            text-align: center;
            color: #ffffff;
            font-weight: 300;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        .card-image-container {
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
            border-radius: 10px;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .card-title {
            font-size: 44px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
        }

        .card-answer {
            font-size: 35px;
            line-height: 1.7;
            color: #e0e0e0;
            text-align: justify;
            font-weight: 300;
        }

        .card-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ffffff;
            text-align: center;
            font-size: 12px;
            color: #ffffff;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 36px;
                letter-spacing: 6px;
            }

            .card-question {
                font-size: 18px;
            }

            .card-answer {
                font-size: 14px;
            }

            .card-title {
                font-size: 20px;
            }

            .card-icon {
                width: 100px;
                height: 100px;
                font-size: 50px;
            }
        }

        @media (min-width: 768px) {
            .container {
                max-width: 100%;
            }

            .header {
                max-width: 500px;
            }

            .flip-card {
                aspect-ratio: 2/3;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="flip-card" onclick="this.classList.toggle('flipped')">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <div class="card-question">Quelle est la signature emblématique d'Yves Saint Laurent dans la mode féminine ?</div>
                </div>
                <div class="flip-card-back">
                    <div class="card-title">Le Smoking</div>
                    <div class="card-image-container">
                        <img src="https://a.storyblok.com/f/95038/622x940/4d98ad2aa2/costume-saint-laurent.png/m/2800x0" alt="Costume Saint Laurent" class="card-image">
                    </div>
                    <div class="card-answer">
                        En 1966, Yves Saint Laurent révolutionne la mode en créant "Le Smoking", le premier tailleur-pantalon pour femmes.
                    </div>
                    <div class="card-footer">YSL Heritage</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
