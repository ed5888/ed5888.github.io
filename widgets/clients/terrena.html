
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligne à Nems — Activité d'apprentissage</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --steel: #1a1f2e;
    --steel-mid: #252c3f;
    --steel-light: #2e3650;
    --accent: #e8a020;
    --accent-bright: #f5b830;
    --safe: #2E7D32;
    --safe-light: #4caf50;
    --text: #e8ecf5;
    --text-dim: #8892a8;
    --panel: rgba(22,27,42,0.98);
    --glow: rgba(232,160,32,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0f1119;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  /* Square container — uses the smaller of vw/vh */
  .square {
    width: min(100vw, 100vh);
    height: min(100vw, 100vh);
    background: var(--steel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Background glow */
  .square::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(232,160,32,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 70%, rgba(46,125,50,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 18px;
    background: rgba(15,17,25,0.9);
    border-bottom: 1px solid rgba(232,160,32,0.2);
  }

  .badge {
    background: var(--accent);
    color: var(--steel);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 3px 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }

  .header-sub {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 300;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .progress-bar {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
  }

  .progress-track {
    width: 80px;
    height: 3px;
    background: var(--steel-light);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
    width: 0%;
  }

  /* ── BODY: image top, panel bottom ── */
  .body {
    position: relative;
    z-index: 1;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  /* ── IMAGE ZONE ── */
  .image-zone {
    position: relative;
    flex: 0 0 58%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 16px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .machine-wrapper {
    position: relative;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .machine-img {
    max-height: 100%;
    max-width: 100%;
    width: auto;
    height: auto;
    display: block;
    filter: drop-shadow(0 8px 30px rgba(0,0,0,0.7));
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ── HOTSPOTS ── */
  .hotspot {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 20;
  }

  .hotspot-ring {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(232,160,32,0.15);
    border: 1.5px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    position: relative;
  }

  .hotspot-ring::before {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px solid rgba(232,160,32,0.3);
    animation: pulse-ring 2s infinite;
  }

  .hotspot-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    color: var(--accent);
    line-height: 1;
  }

  .hotspot:hover .hotspot-ring,
  .hotspot.active .hotspot-ring {
    background: rgba(232,160,32,0.3);
    border-color: var(--accent-bright);
    transform: scale(1.2);
    box-shadow: 0 0 14px var(--glow);
  }

  .hotspot.active .hotspot-ring { background: var(--accent); }
  .hotspot.active .hotspot-num { color: var(--steel); }

  .hotspot.discovered .hotspot-ring {
    border-color: var(--safe-light);
    background: rgba(46,125,50,0.15);
  }
  .hotspot.discovered .hotspot-num { color: var(--safe-light); }
  .hotspot.discovered.active .hotspot-ring { background: var(--safe); }
  .hotspot.discovered.active .hotspot-num { color: #fff; }

  @keyframes pulse-ring {
    0%   { transform: scale(1);   opacity: 0.6; }
    50%  { transform: scale(1.12); opacity: 0.2; }
    100% { transform: scale(1);   opacity: 0.6; }
  }

  /* ── BOTTOM PANEL ── */
  .bottom-panel {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: row;
    overflow: hidden;
  }

  /* Info pane */
  .info-pane {
    flex: 1;
    min-width: 0;
    padding: 12px 16px;
    overflow-y: auto;
    border-right: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0.35;
    text-align: center;
  }

  .placeholder-icon {
    font-size: 22px;
  }

  .card-content {
    display: none;
    flex-direction: column;
    gap: 8px;
    animation: slide-in 0.25s ease;
  }

  .card-content.visible { display: flex; }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .card-tag {
    display: inline-flex;
    align-items: center;
    background: rgba(232,160,32,0.1);
    border: 1px solid rgba(232,160,32,0.2);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1.1;
  }

  .card-title::after {
    content: '';
    display: block;
    width: 28px;
    height: 2px;
    background: var(--accent);
    margin-top: 5px;
  }

  .card-description {
    font-size: 11px;
    line-height: 1.6;
    color: #b8c0d4;
    font-weight: 300;
  }

  .card-specs {
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px;
    padding: 8px 10px;
  }

  .spec-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .spec-key {
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
  }

  .spec-val {
    color: var(--text);
    font-weight: 500;
    font-size: 10px;
    text-align: right;
  }

  .card-tip {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    background: rgba(46,125,50,0.07);
    border: 1px solid rgba(46,125,50,0.2);
    border-radius: 4px;
    padding: 8px 10px;
  }

  .tip-icon { font-size: 11px; flex-shrink: 0; margin-top: 1px; }

  .tip-text {
    font-size: 10px;
    color: #81c784;
    line-height: 1.5;
  }

  /* Elements list pane */
  .list-pane {
    width: 170px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: rgba(15,17,25,0.4);
  }

  .list-pane-header {
    padding: 10px 12px 6px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
  }

  .list-scroll {
    overflow-y: auto;
    flex: 1;
    padding: 4px 0;
  }

  .elem-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px;
    border: none;
    background: transparent;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background 0.12s;
    border-left: 2px solid transparent;
  }

  .elem-btn:hover { background: rgba(255,255,255,0.04); }

  .elem-btn.active {
    background: rgba(232,160,32,0.07);
    border-left-color: var(--accent);
  }

  .elem-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .elem-btn.active .elem-dot {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--steel);
  }

  .elem-btn.discovered .elem-dot {
    border-color: var(--safe-light);
    color: var(--safe-light);
  }

  .elem-name {
    font-size: 11px;
    color: var(--text-dim);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.12s;
  }

  .elem-btn:hover .elem-name,
  .elem-btn.active .elem-name { color: var(--text); }

  .elem-check {
    font-size: 10px;
    color: var(--safe-light);
    opacity: 0;
    flex-shrink: 0;
  }

  .elem-btn.discovered .elem-check { opacity: 1; }

  /* Score banner */
  .score-banner {
    display: none;
    padding: 6px 12px;
    background: linear-gradient(135deg, rgba(46,125,50,0.2), rgba(46,125,50,0.05));
    border-bottom: 1px solid rgba(46,125,50,0.3);
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .score-banner.show { display: flex; animation: slide-in 0.4s ease; }
  .score-icon { font-size: 14px; }
  .score-text { font-size: 11px; color: #81c784; font-weight: 500; }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--steel-light); border-radius: 2px; }
</style>
</head>
<body>

<div class="square">

  <!-- HEADER -->

    <!-- BOTTOM PANEL -->
    <div class="bottom-panel">

      <!-- Info card -->
      <div class="info-pane">

        <div class="card-placeholder" id="cardPlaceholder">

        <div class="card-content" id="cardContent">
          <span class="card-tag" id="cardTag">COMPOSANT</span>

      <!-- Elements list -->
      <div class="list-pane">
        <div class="list-pane-header">Composants</div>
        <div class="list-scroll" id="elementsList"></div>
      </div>

    </div>
  </div>
</div>

  },
];

let discovered = new Set();
let activeId = null;

// Build list
const listEl = document.getElementById('elementsList');
elements.forEach(el => {
  const btn = document.createElement('button');
  btn.className = 'elem-btn';
  btn.id = `btn-${el.id}`;
  btn.onclick = () => selectElement(el.id);
  btn.innerHTML = `
    <div class="elem-dot">${el.id}</div>
    <span class="elem-name">${el.name}</span>
    <span class="elem-check">✓</span>
  `;
  listEl.appendChild(btn);
});

function selectElement(id) {
  activeId = id;
  const el = elements.find(e => e.id === id);
  if (!el) return;

  discovered.add(id);
  updateProgress();

  document.querySelectorAll('.hotspot').forEach(h => {
    h.classList.remove('active');
    if (discovered.has(parseInt(h.dataset.id))) h.classList.add('discovered');
  });
  const activeHotspot = document.querySelector(`.hotspot[data-id="${id}"]`);
  if (activeHotspot) activeHotspot.classList.add('active');

  document.querySelectorAll('.elem-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById(`btn-${id}`);
  if (activeBtn) { activeBtn.classList.add('active', 'discovered'); }

  document.getElementById('cardPlaceholder').style.display = 'none';
  const content = document.getElementById('cardContent');
  content.classList.remove('visible');
  void content.offsetWidth;
  content.classList.add('visible');

  document.getElementById('cardTag').textContent = el.tag;
  document.getElementById('cardTitle').textContent = el.title;
  document.getElementById('cardDesc').textContent = el.desc;

  document.getElementById('cardSpecs').innerHTML = el.specs.map(s =>
    `<div class="spec-row"><span class="spec-key">${s.k}</span><span class="spec-val">${s.v}</span></div>`
  ).join('');

  document.getElementById('cardTipText').textContent = el.tip;

  if (discovered.size === elements.length) {
    document.getElementById('scoreBanner').classList.add('show');
  }
}

function updateProgress() {
  const count = discovered.size;
  const total = elements.length;
  document.getElementById('progressLabel').textContent = `${count} / ${total}`;
  document.getElementById('progressFill').style.width = `${(count / total) * 100}%`;
}
</script>
</body>
</html>
